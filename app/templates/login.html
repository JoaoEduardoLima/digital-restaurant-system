{% extends "layout_admin.html" %}

{% block title %}Login{% endblock %}

{% block main %}
    <div class="container py-4 d-flex flex-column align-items-center">
        <p>Please log in to access the restaurant management system.</p>
        <form action="/login" method="post">
            <div class="mb-3">
                <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="username"
                    placeholder="Username" type="text">
            </div>
            <div class="mb-3 ">
                <input class="form-control mx-auto w-auto" name="password" placeholder="Password" type="password">
            </div>
            <button class="btn btn-primary mt-auto w-100" type="submit">Log In</button>
        </form>
    </div>
{% endblock %}
