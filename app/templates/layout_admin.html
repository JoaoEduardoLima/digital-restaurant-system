<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <title>{% block title %}{% endblock %}</title>
</head>

<body>
    {% if session.get("user_id") %}
    <div class="bg-secondary-subtle">
        <header class="d-flex justify-content-center py-3">
            <ul class="nav nav-pills">
                <li class="nav-item">
                    <a href="/restaurant/kitchen"
                        class="nav-link {% if active == 'kitchen' %}active{% endif %}">Kitchen</a>
                </li>
                <li class="nav-item">
                    <a href="/restaurant/checkout"
                        class="nav-link {% if active == 'checkout' %}active{% endif %}">Checkout</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-bs-toggle="modal" data-bs-target="#logoutModal">Logout</a>
                </li>
            </ul>
        </header>
    </div>

    <!-- Modal logout -->
    <div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-light">
                <div class="modal-header">
                    <h5 class="modal-title">Confirm Logout</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to log out?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <a href="/login" class="btn btn-danger">Logout</a>
                </div>
            </div>
        </div>
    </div>

    {% elif not session.get("user_id") %}
    <div class="bg-secondary-subtle">
        <header class="d-flex justify-content-center py-3">
            <ul class="nav nav-pills">
                <li class="nav-item">
                    <a href="/login" class="nav-link {% if active == 'login' %}active{% endif %}">Login</a>
                </li>
            </ul>
        </header>
    </div>
    {% endif %}

    <main>
        {% block main %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}

    <footer class="text-center py-3 mt-5 border-top">
        <small>&copy; 2026 Virtual Menu</small>
    </footer>
</body>

</html>
